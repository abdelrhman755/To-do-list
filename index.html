<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="s-container">

            <div class="details">

                <h1>Assassin List</h1>
                <p>The True Assassin Never Fail In His Misson</p>

                <div id="progressbar">
                    <div id="progress"></div>
                </div>

                <div class="s-num">
                    <p id="numbers">2 / 3</p>
                </div>

            </div>

        </div>

        <form action="">
            <input type="text" placeholder="Write Your Misson">
            <button type="submit"></button>
        </form>

        <ul class="task-list"></ul>

    </div>

    <script href="script.js"></script>
</body>
</html>
